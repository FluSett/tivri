worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    sendfile_max_chunk 512k;
    aio             threads;
    tcp_nopush      on;
    tcp_nodelay     on;
    
    keepalive_timeout  65;
    keepalive_requests 1000;
    server_tokens off;

    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    client_max_body_size 2M;
    client_body_buffer_size 2M;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    gzip on;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    limit_req_zone $binary_remote_addr zone=intake_limit:10m rate=1r/s;
    limit_req_zone $binary_remote_addr zone=contact_limit:10m rate=1r/s;

    set_real_ip_from 103.21.244.0/22;
    real_ip_header CF-Connecting-IP;

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2 fastopen=256 reuseport backlog=4096;
        server_name _;

        ssl_certificate /etc/ssl/certs/server.pem;
        ssl_certificate_key /etc/ssl/private/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 1.0.0.1 valid=300s;
        resolver_timeout 5s;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        set $CSP "default-src 'self'; ";
        set $CSP "${CSP}script-src 'self' https://unpkg.com https://cdn.jsdelivr.net https://challenges.cloudflare.com https://static.cloudflareinsights.com; ";
        set $CSP "${CSP}style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; ";
        set $CSP "${CSP}font-src 'self' https://fonts.gstatic.com; ";
        set $CSP "${CSP}frame-src 'self' https://challenges.cloudflare.com; ";
        set $CSP "${CSP}connect-src 'self' https://challenges.cloudflare.com https://static.cloudflareinsights.com; ";
        set $CSP "${CSP}img-src 'self' data:; ";
        set $CSP "${CSP}upgrade-insecure-requests;";

        add_header Content-Security-Policy $CSP always;

        location /assets/ {
            proxy_pass http://web:8080;
            expires max;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /api/intake {
            limit_req zone=intake_limit burst=10 delay=5;
            proxy_pass http://web:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/contact {
            limit_req zone=contact_limit burst=10 delay=5;
            proxy_pass http://web:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://web:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_buffering on;
            proxy_buffers 16 16k;
            proxy_buffer_size 16k;
            proxy_read_timeout 90s;
        }
    }
}
