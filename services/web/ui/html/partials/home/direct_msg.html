{{define "home.direct_msg.html"}}
<div class="border border-white/[0.08] bg-white/[0.02] p-8 rounded-xl hover:border-[#FF3366]/30 hover:shadow-[0_0_30px_rgba(255,51,102,0.05)] transition-all duration-500"
     x-data="{
         showForm: false,
         submitted: sessionStorage.getItem('contact_submitted') === 'true',
         email: sessionStorage.getItem('contact_email') || '',
         topic: sessionStorage.getItem('contact_topic') || '',
         message: sessionStorage.getItem('contact_message') || '',
         emailTouched: false,
         topicTouched: false,
         messageTouched: false,
         init() {
             this.$watch('email', val => sessionStorage.setItem('contact_email', val || ''));
             this.$watch('topic', val => sessionStorage.setItem('contact_topic', val || ''));
             this.$watch('message', val => sessionStorage.setItem('contact_message', val || ''));
             this.$watch('submitted', val => sessionStorage.setItem('contact_submitted', val));
         },
         resetForm() {
             this.submitted = false;
             this.email = '';
             this.topic = '';
             this.message = '';
             this.emailTouched = false;
             this.topicTouched = false;
             this.messageTouched = false;
             sessionStorage.removeItem('contact_email');
             sessionStorage.removeItem('contact_topic');
             sessionStorage.removeItem('contact_message');
             sessionStorage.removeItem('contact_submitted');
         }
     }">
    <div class="space-y-6">
        <div @click="showForm = !showForm" class="pb-3 border-b border-white/[0.08] flex justify-between items-center cursor-pointer group">
            <div class="space-y-1">
                <h3 class="text-xl font-bold text-white group-hover:text-[#FF3366] transition-colors tracking-tight">{{.T.Get "DirectMsgTitle"}}</h3>
                <p class="text-xs text-neutral-400 mt-1">{{.T.Get "DirectMsgSub"}}</p>
            </div>
            <svg class="w-5 h-5 text-neutral-400 transition-transform duration-300 group-hover:text-white" :class="showForm ? 'rotate-180 text-white' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
            </svg>
        </div>

        <div x-show="showForm" x-cloak x-collapse class="space-y-6">
            <div x-show="submitted" class="backdrop-blur-md bg-green-500/10 border border-green-500/20 text-green-400 p-6 rounded-xl flex flex-col items-center space-y-3 text-center">
                <div class="flex items-center space-x-3 justify-center">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <div class="text-sm font-semibold tracking-tight">{{.T.Get "SuccessMsg"}}</div>
                </div>
                <button type="button" @click="resetForm()" class="text-xs text-neutral-400 hover:text-white underline transition-colors pt-2">
                    {{.T.Get "SendAnother"}}
                </button>
            </div>

            <form x-show="!submitted"
                  hx-post="/api/contact" 
                  hx-target="this" 
                  hx-swap="none" 
                  @htmx:after-request="if($event.detail.successful) { submitted = true; email = ''; topic = ''; message = ''; sessionStorage.removeItem('contact_email'); sessionStorage.removeItem('contact_topic'); sessionStorage.removeItem('contact_message'); }"
                  class="space-y-4">
                <input type="hidden" name="lang" value="{{.Lang}}">
                
                <div class="space-y-1">
                    <label class="block text-xs font-bold uppercase tracking-wider text-neutral-400">{{.T.Get "FormEmailLabel"}}</label>
                    <input type="email" name="email" required minlength="5" maxlength="100" x-model="email" 
                           @input.debounce.500ms="emailTouched = true" @blur="emailTouched = true"
                           class="w-full bg-[#0A0A0A] border border-white/[0.08] focus:border-[#FF3366] text-sm px-4 py-2.5 rounded text-white focus:outline-none hover:border-white/20 hover:bg-white/[0.01] transition-all duration-200" placeholder="{{.T.Get "PlaceholderEmail"}}">
                    <div class="text-[10px] text-[#FF3366] font-medium" x-show="emailTouched && (email.trim().length < 5 || !email.includes('@') || !email.includes('.'))">
                        {{.T.Get "ValValidEmail"}}
                    </div>
                </div>
                
                <div class="space-y-1">
                    <label class="block text-xs font-bold uppercase tracking-wider text-neutral-400">{{.T.Get "FormTopicLabel"}}</label>
                    <input type="text" name="topic" required minlength="3" maxlength="150" x-model="topic"
                           @input.debounce.500ms="topicTouched = true" @blur="topicTouched = true"
                           class="w-full bg-[#0A0A0A] border border-white/[0.08] focus:border-[#FF3366] text-sm px-4 py-2.5 rounded text-white focus:outline-none hover:border-white/20 hover:bg-white/[0.01] transition-all duration-200" placeholder="{{.T.Get "PlaceholderTopic"}}">
                    <div class="text-[10px] text-[#FF3366] font-medium" x-show="topicTouched && topic.trim().length < 3">
                        {{.T.Get "ValTopicRequired"}}
                    </div>
                </div>
                
                <div class="space-y-1">
                    <label class="block text-xs font-bold uppercase tracking-wider text-neutral-400">{{.T.Get "FormMessageLabel"}}</label>
                    <textarea name="message" required minlength="10" maxlength="1000" rows="4" 
                              x-model="message"
                              @input.debounce.500ms="messageTouched = true" @blur="messageTouched = true"
                              x-data="{ resize() { $el.style.height = 'auto'; $el.style.height = ($el.scrollHeight) + 'px' } }"
                              x-on:input="resize()"
                              class="w-full bg-[#0A0A0A] border border-white/[0.08] focus:border-[#FF3366] text-sm px-4 py-2.5 rounded text-white focus:outline-none hover:border-white/20 hover:bg-white/[0.01] transition-all duration-200 resize-none max-h-48" 
                              placeholder="{{.T.Get "PlaceholderMessage"}}"></textarea>
                    <div class="flex justify-between items-center text-[10px] mt-1">
                        <span class="text-[#FF3366] font-medium" x-show="messageTouched && message.trim().length < 10">
                            {{.T.Get "ValMessageMin10"}}
                        </span>
                        <span x-show="!messageTouched || message.trim().length >= 10"></span>
                        <span class="text-neutral-400 font-semibold font-mono text-xs" x-text="message.length + ' / 1000'"></span>
                    </div>
                </div>
                
                <div id="contact-status">
                    <button type="submit" 
                            :disabled="email.trim().length < 5 || !email.includes('@') || !email.includes('.') || topic.trim().length < 3 || message.trim().length < 10"
                            :class="(email.trim().length < 5 || !email.includes('@') || !email.includes('.') || topic.trim().length < 3 || message.trim().length < 10) ? 'bg-white/10 text-neutral-500 cursor-not-allowed border-transparent' : 'bg-transparent text-white border border-[#FF3366] hover:bg-[#FF3366] hover:shadow-[0_0_15px_rgba(255,51,102,0.4)]'"
                            class="w-full font-bold text-xs uppercase tracking-wider py-3 rounded-lg transition-all duration-300">
                        {{.T.Get "SendBtn"}}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{{end}}
