{{define "section.benefits.html"}}
<section id="benefits" class="relative min-h-[80vh] flex flex-col justify-between py-8 md:py-12 scroll-mt-16 md:scroll-mt-28">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-center my-auto flex-grow">
        <div class="hidden lg:block lg:col-span-1 text-left">
            <div class="flex flex-col items-center space-y-4">
                <span class="text-xs font-bold tracking-widest text-[#FF3366] rotate-90 my-4">02</span>
                <div class="w-px h-24 bg-white/20"></div>
            </div>
        </div>
        
        <div class="lg:col-span-11 space-y-8">
            <div class="flex items-center space-x-4 mb-4">
                <div class="w-8 h-px bg-[#FF3366]"></div>
                <h2 class="text-xs font-bold uppercase tracking-widest text-[#FF3366]">{{.T.Get "WhyNav"}}</h2>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="border border-white/[0.08] backdrop-blur-md bg-white/[0.02] p-8 rounded-xl space-y-4 hover:border-[#FF3366]/40 transition-all duration-300 group hover:-translate-y-1">
                    <span class="text-xs font-bold text-neutral-500 uppercase tracking-widest block">01</span>
                    <h3 class="text-lg font-bold text-white tracking-tight">{{.T.Get "Why1Title"}}</h3>
                    <p class="text-sm text-neutral-400 leading-relaxed tracking-tight">{{.T.Get "Why1Desc"}}</p>
                </div>
                <div class="border border-white/[0.08] backdrop-blur-md bg-white/[0.02] p-8 rounded-xl space-y-4 hover:border-[#FF3366]/40 transition-all duration-300 group hover:-translate-y-1">
                    <span class="text-xs font-bold text-neutral-500 uppercase tracking-widest block">02</span>
                    <h3 class="text-lg font-bold text-white tracking-tight">{{.T.Get "Why2Title"}}</h3>
                    <p class="text-sm text-neutral-400 leading-relaxed tracking-tight">{{.T.Get "Why2Desc"}}</p>
                </div>
                <div class="border border-white/[0.08] backdrop-blur-md bg-white/[0.02] p-8 rounded-xl space-y-4 hover:border-[#FF3366]/40 transition-all duration-300 group hover:-translate-y-1">
                    <span class="text-xs font-bold text-neutral-500 uppercase tracking-widest block">03</span>
                    <h3 class="text-lg font-bold text-white tracking-tight">{{.T.Get "Why3Title"}}</h3>
                    <p class="text-sm text-neutral-400 leading-relaxed tracking-tight">{{.T.Get "Why3Desc"}}</p>
                </div>
                <div class="border border-white/[0.08] backdrop-blur-md bg-white/[0.02] p-8 rounded-xl space-y-4 hover:border-[#FF3366]/40 transition-all duration-300 group hover:-translate-y-1">
                    <span class="text-xs font-bold text-neutral-500 uppercase tracking-widest block">04</span>
                    <h3 class="text-lg font-bold text-white tracking-tight">{{.T.Get "Why4Title"}}</h3>
                    <p class="text-sm text-neutral-400 leading-relaxed tracking-tight">{{.T.Get "Why4Desc"}}</p>
                </div>
            </div>
        </div>
    </div>

    <div class="flex justify-end items-center mt-auto pt-8 w-full">
        <div class="flex items-center space-x-4">
            <a href="/#about" class="w-10 h-10 rounded-full border border-white/[0.08] bg-white/[0.02] hover:bg-[#FF3366] hover:border-[#FF3366] hover:shadow-[0_0_15px_rgba(255,51,102,0.4)] flex items-center justify-center text-neutral-400 hover:text-white transition-all duration-300 hover:scale-110">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path>
                </svg>
            </a>
            <a href="/#skills" class="w-10 h-10 rounded-full border border-white/[0.08] bg-white/[0.02] hover:bg-[#FF3366] hover:border-[#FF3366] hover:shadow-[0_0_15px_rgba(255,51,102,0.4)] flex items-center justify-center text-neutral-400 hover:text-white transition-all duration-300 hover:scale-110">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path>
                </svg>
            </a>
        </div>
    </div>
</section>
{{end}}
