{{define "content"}}
<div class="min-h-[70vh] flex flex-col items-center justify-center text-center py-20 px-6 space-y-8">
    <div class="relative w-32 h-32 flex items-center justify-center">
        <div class="absolute inset-0 rounded-full border border-[#FF3366]/20 animate-ping" style="animation-duration: 3s;"></div>
        <div class="relative w-24 h-24 rounded-full bg-white/[0.02] border border-white/[0.08] flex flex-col items-center justify-center shadow-2xl backdrop-blur-md">
            <span class="text-4xl font-black tracking-tight text-white font-mono">404</span>
        </div>
    </div>

    <div class="space-y-3 max-w-md">
        <h2 class="text-2xl md:text-3xl font-black tracking-tighter text-white">Page Not Found</h2>
        <p class="text-sm text-neutral-400 leading-relaxed">
            The page you are looking for does not exist, has been moved, or is temporarily unavailable.
        </p>
    </div>

    <a href="/" class="inline-flex items-center space-x-2 bg-[#FF3366] text-white hover:bg-[#FF3366]/80 hover:shadow-[0_0_25px_rgba(255,51,102,0.4)] font-bold text-xs uppercase tracking-wider px-8 py-3 rounded-xl transition-all duration-300">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        <span>Back to Home</span>
    </a>
</div>
{{end}}
