<!DOCTYPE html>
<html lang="{{.Lang}}" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.T.Get "MetaTitle"}}</title>
    <meta name="description" content="{{.T.Get "MetaDescription"}}">
    <meta name="htmx-config" content='{"globalViewTransitions":"true"}'>
    
    <!-- SEO Localization Alternates -->
    <link rel="alternate" hreflang="x-default" href="{{.AppURL}}{{.CurrentPath}}" />
    <link rel="alternate" hreflang="en" href="{{.AppURL}}{{.CurrentPath}}?lang=en" />
    <link rel="alternate" hreflang="uk" href="{{.AppURL}}{{.CurrentPath}}?lang=uk" />
    <link rel="alternate" hreflang="ru" href="{{.AppURL}}{{.CurrentPath}}?lang=ru" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{.T.Get "MetaTitle"}}">
    <meta property="og:description" content="{{.T.Get "MetaDescription"}}">
    <meta property="og:url" content="{{.AppURL}}/">
    <meta property="og:image" content="{{.AppURL}}/assets/img/branding/logo.webp">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{.T.Get "MetaTitle"}}">
    <meta name="twitter:description" content="{{.T.Get "MetaDescription"}}">
    <meta name="twitter:image" content="{{.AppURL}}/assets/img/branding/logo.webp">
    
    <!-- JSON-LD Structured Data (Cleaned of empty attributes) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "TIVRI",
      "image": "{{.AppURL}}/assets/img/branding/logo.webp",
      "@id": "{{.AppURL}}/#organization",
      "url": "{{.AppURL}}/",
      "sameAs": [
        "https://x.com",
        "https://linkedin.com",
        "https://tiktok.com"
      ],
      "description": "{{.T.Get "MetaDescription"}}"
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
    
    <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
    <script src="/assets/dist/js/app.min.js?v={{assetVersion}}" defer></script>
    
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/intersect@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/csp@3.x.x/dist/cdn.min.js"></script>


    {{if .TurnstileSiteKey}}
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" defer></script>
    {{end}}
    <link rel="stylesheet" href="/assets/dist/css/theme.css?v={{assetVersion}}">
</head>
<body class="min-h-dvh flex flex-col justify-between font-sans selection:bg-primary selection:text-white relative"
      :class="getOverflowClass()"
      x-data="layout"
      @resize.window="handleResize()"
      data-turnstile-sitekey="{{.TurnstileSiteKey}}">
      
    {{template "layout.background_grid.html" .}}
    {{template "layout.global_error.html" .}}

    {{template "layout.header.html" .}}
    {{template "layout.mobile_menu.html" .}}

    <main class="w-full max-w-[1600px] mx-auto px-6 md:px-16 lg:px-24 pt-32 pb-16 grow relative z-10">
        {{template "content" .}}
    </main>

    {{template "layout.footer.html" .}}
</body>
</html>
