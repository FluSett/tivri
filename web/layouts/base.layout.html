<!DOCTYPE html>
<html lang="{{.Lang}}" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.T.Get "MetaTitle"}}</title>
    <meta name="description" content="{{.T.Get "MetaDescription"}}">
    
    <!-- SEO Localization Alternates -->
    <link rel="alternate" hreflang="x-default" href="{{.AppURL}}{{.CurrentPath}}" />
    <link rel="alternate" hreflang="en" href="{{.AppURL}}{{.CurrentPath}}?lang=en" />
    <link rel="alternate" hreflang="uk" href="{{.AppURL}}{{.CurrentPath}}?lang=uk" />
    <link rel="alternate" hreflang="ru" href="{{.AppURL}}{{.CurrentPath}}?lang=ru" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{.T.Get "MetaTitle"}}">
    <meta property="og:description" content="{{.T.Get "MetaDescription"}}">
    <meta property="og:url" content="{{.AppURL}}/">
    <meta property="og:image" content="{{.AppURL}}/assets/img/branding/logo.webp">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{.T.Get "MetaTitle"}}">
    <meta name="twitter:description" content="{{.T.Get "MetaDescription"}}">
    <meta name="twitter:image" content="{{.AppURL}}/assets/img/branding/logo.webp">
    
    <!-- JSON-LD Structured Data (Cleaned of empty attributes) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "TIVRI",
      "image": "{{.AppURL}}/assets/img/branding/logo.webp",
      "@id": "{{.AppURL}}/#organization",
      "url": "{{.AppURL}}/",
      "sameAs": [
        "https://x.com",
        "https://linkedin.com",
        "https://tiktok.com"
      ],
      "description": "{{.T.Get "MetaDescription"}}"
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
    
    <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>
    <script src="/assets/dist/js/app.min.js?v={{assetVersion}}" defer></script>
    <script src="/assets/dist/js/admin.min.js?v={{assetVersion}}" defer></script>
    <script src="/assets/dist/js/components/stepper.min.js?v={{assetVersion}}" defer></script>
    <script src="/assets/dist/js/components/contact.min.js?v={{assetVersion}}" defer></script>
    
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/intersect@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @view-transition { navigation: auto; }
    </style>
    <script>
        document.addEventListener('htmx:configRequest', (event) => {
            window.htmx.config.globalViewTransitions = true;
        });
    </script>
    {{if .TurnstileSiteKey}}
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" defer></script>
    {{end}}
    <link rel="stylesheet" href="/assets/dist/css/theme.css?v={{assetVersion}}">
</head>
<body class="min-h-screen flex flex-col justify-between font-sans selection:bg-primary selection:text-white relative"
      hx-boost="true"
      :class="mobileMenuOpen ? 'overflow-hidden' : ''"
      x-data="layout"
      x-on:resize.window="if (window.innerWidth >= 768) mobileMenuOpen = false"
      data-turnstile-sitekey="{{.TurnstileSiteKey}}">
      
    <div class="fixed inset-0 pointer-events-none z-0 flex justify-between w-full px-4 md:px-16 lg:px-24">
        <div class="w-px h-full bg-white/3"></div>
        <div class="w-px h-full bg-white/3 hidden md:block"></div>
        <div class="w-px h-full bg-white/3 hidden md:block"></div>
        <div class="w-px h-full bg-white/3"></div>
    </div>

    <!-- Beautiful Global Error UI Alert Box -->
    <div x-data="globalError"
         x-show="showError"
         x-cloak
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0 scale-100"
         x-transition:leave-end="opacity-0 translate-y-4 scale-95"
         class="fixed bottom-6 right-6 z-999 max-w-sm w-full bg-bg-dark border border-primary/40 shadow-[0_0_30px_rgba(255,51,102,0.15)] rounded-xl p-4 flex items-start space-x-3 backdrop-blur-md">
        <div class="shrink-0 text-primary mt-0.5">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
        </div>
        <div class="grow space-y-1">
            <div class="flex items-center justify-between gap-4">
                <h4 class="text-xs font-black uppercase tracking-wider text-white">System Notice</h4>
                <span class="text-[10px] text-neutral-400 font-mono" x-text="errorTime"></span>
            </div>
            <p class="text-xs text-neutral-300 leading-normal" x-text="errorMessage"></p>
        </div>
        <button @click="showError = false" class="text-neutral-500 hover:text-white transition-colors shrink-0">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>

    {{template "layout.header.html" .}}
    {{template "layout.mobile_menu.html" .}}

    <main class="w-full max-w-[1600px] mx-auto px-6 md:px-16 lg:px-24 pt-32 pb-16 grow relative z-10">
        {{template "content" .}}
    </main>

    {{template "layout.footer.html" .}}
</body>
</html>
