{{define "components.dropdown.html"}}
{{if .Label}}
<div class="space-y-1">
    <label class="block text-primary font-bold uppercase tracking-widest text-[11px] mb-1.5">{{.Label}}</label>
{{end}}
    <div class="relative">
        <button {{if .BtnID}}id="{{.BtnID}}"{{end}} data-ref="{{.BtnRef}}" {{if .BtnDataID}}data-id="{{.BtnDataID}}"{{end}} {{if .BtnAction}}data-action="{{.BtnAction}}"{{end}} type="button" class="{{if .BtnClass}}{{.BtnClass}}{{else}}bg-black/60 border border-white/8 hover:border-white/20 text-xs px-3.5 py-2 rounded-xl text-white focus:outline-none transition-all duration-200 cursor-pointer font-medium flex items-center gap-2 min-w-[120px] justify-between{{end}}">
            <span {{if .TextID}}id="{{.TextID}}"{{end}} data-ref="{{.TextRef}}">{{.DefaultText}}</span>
            <svg class="w-3 h-3 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
        </button>
        <div {{if .DropdownID}}id="{{.DropdownID}}"{{end}} data-ref="{{.DropdownRef}}"
              class="hidden absolute z-50 mt-1.5 w-full rounded-xl border border-white/8 bg-bg-dark p-1 shadow-2xl panel-animate opacity-0 translate-y-2 pointer-events-none delay-200 text-left">
            {{range .Options}}
            <button type="button" {{if .OptionAction}}data-action="{{.OptionAction}}"{{else if $.OptionAction}}data-action="{{$.OptionAction}}"{{end}} data-val="{{.Value}}" class="dropdown-option capitalize text-left {{if .Class}}{{.Class}}{{else}}w-full px-4 py-2 text-sm hover:bg-white/5 transition-colors text-neutral-300 hover:text-white{{end}}">{{.Label}}</button>
            {{end}}
        </div>
    </div>
{{if .Label}}
</div>
{{end}}
{{end}}
