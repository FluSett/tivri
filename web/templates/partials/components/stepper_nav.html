{{define "components.stepper_nav"}}
<div class="flex justify-between items-center {{if .Pt}}pt-2{{end}}">
    <div class="flex gap-2">
        {{if .PrevRef}}
        <button type="button" data-ref="{{.PrevRef}}" data-action="prev"
                class="btn-secondary cursor-pointer">
            {{.Root.T.Get "PrevBtn"}}
        </button>
        {{end}}
        {{if .CloseRef}}
        <button type="button" data-ref="{{.CloseRef}}" data-action="close"
                class="btn-secondary cursor-pointer">
            {{.Root.T.Get "CloseBtn"}}
        </button>
        {{end}}
    </div>
    {{if .NextRef}}
    <button type="button" data-ref="{{.NextRef}}" data-action="next"
            class="btn-primary-form cursor-pointer disabled:cursor-not-allowed">
        {{.Root.T.Get "NextBtn"}}
    </button>
    {{end}}
    {{if .SubmitRef}}
    <button type="submit" data-ref="{{.SubmitRef}}" disabled
            class="btn-primary flex items-center justify-center space-x-2 min-w-[120px] py-3 px-6">
            <span data-ref="submitText">{{.Root.T.Get "FormSubmitBtn"}}</span>
        <span data-ref="submitSpinner" class="opacity-0 hidden">
            <svg class="animate-spin h-3.5 w-3.5 text-white" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
        </span>
    </button>
    {{end}}
</div>
{{end}}
