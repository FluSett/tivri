{{define "components.lang_switcher"}}
{{if .IsMobile}}
<button type="button" {{if eq .Lang "en"}}disabled class="{{.DisabledClass}}"{{else}}data-preserve-scroll @click="sessionStorage.setItem('locale_change', 'true'); mobileMenuOpen = false; setTimeout(() => htmx.ajax('GET', '/api/lang?lang=en', {target: 'body', swap: 'outerHTML transition:true'}), 350)" class="{{.NormalClass}}"{{end}}>EN</button>
<button type="button" {{if eq .Lang "uk"}}disabled class="{{.DisabledClass}}"{{else}}data-preserve-scroll @click="sessionStorage.setItem('locale_change', 'true'); mobileMenuOpen = false; setTimeout(() => htmx.ajax('GET', '/api/lang?lang=uk', {target: 'body', swap: 'outerHTML transition:true'}), 350)" class="{{.NormalClass}}"{{end}}>UA</button>
<button type="button" {{if eq .Lang "ru"}}disabled class="{{.DisabledClass}}"{{else}}data-preserve-scroll @click="sessionStorage.setItem('locale_change', 'true'); mobileMenuOpen = false; setTimeout(() => htmx.ajax('GET', '/api/lang?lang=ru', {target: 'body', swap: 'outerHTML transition:true'}), 350)" class="{{.NormalClass}}"{{end}}>RU</button>
{{else}}
<button type="button" {{if eq .Lang "en"}}disabled class="{{.DisabledClass}}"{{else}}hx-get="/api/lang?lang=en" hx-target="body" hx-swap="outerHTML transition:true" @click="sessionStorage.setItem('locale_change', 'true')" data-preserve-scroll class="{{.NormalClass}}"{{end}}>EN</button>
<button type="button" {{if eq .Lang "uk"}}disabled class="{{.DisabledClass}}"{{else}}hx-get="/api/lang?lang=uk" hx-target="body" hx-swap="outerHTML transition:true" @click="sessionStorage.setItem('locale_change', 'true')" data-preserve-scroll class="{{.NormalClass}}"{{end}}>UA</button>
<button type="button" {{if eq .Lang "ru"}}disabled class="{{.DisabledClass}}"{{else}}hx-get="/api/lang?lang=ru" hx-target="body" hx-swap="outerHTML transition:true" @click="sessionStorage.setItem('locale_change', 'true')" data-preserve-scroll class="{{.NormalClass}}"{{end}}>RU</button>
{{end}}
{{end}}
