{{define "layout.tech_banner"}}
<div id="tech-banner" data-ref="techBanner" class="fixed bottom-4 left-4 md:bottom-8 md:left-8 z-40 w-[calc(100%-2rem)] max-w-sm transition-all duration-500 translate-y-8 opacity-0 pointer-events-none">
    <div class="bg-neutral-900/90 backdrop-blur-md border border-white/10 hover:border-primary/40 rounded-2xl p-5 shadow-[0_8px_30px_rgb(0,0,0,0.4)] hover:shadow-[0_20px_50px_rgba(255,51,102,0.25)] relative overflow-hidden pointer-events-auto group transition-all duration-500 ease-out hover:-translate-y-2 hover:scale-[1.02]">
        <!-- Glow effect -->
        <div class="absolute -top-12 -left-12 w-36 h-36 bg-primary/15 rounded-full blur-3xl pointer-events-none transition-all duration-700 group-hover:scale-180 group-hover:bg-primary/30"></div>
        
        <div class="relative z-10">
            <div class="flex items-start justify-between gap-3 mb-3">
                <div class="flex items-center gap-2 text-primary font-bold text-sm tracking-wide uppercase">
                    <svg class="w-4 h-4 drop-shadow-[0_0_8px_rgba(255,51,102,0.5)] transition-transform duration-500 group-hover:scale-125 group-hover:rotate-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                    <span>{{.T.Get "TechBannerTitle"}}</span>
                </div>
                <div class="flex items-center gap-1 -mt-1 -mr-1">
                    <button data-action="toggleTechInfo" class="text-neutral-500 hover:text-white transition-colors p-1.5 rounded-lg hover:bg-white/10" title="More Info">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </button>
                    <button data-action="closeTechBanner" class="text-neutral-500 hover:text-white transition-colors p-1.5 rounded-lg hover:bg-white/10" title="Dismiss">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <p class="text-sm text-neutral-300 leading-relaxed font-medium">
                {{.T.Get "TechBannerText"}}
            </p>

            <div id="tech-banner-info" data-ref="techInfo" class="hidden mt-4 pt-4 border-t border-white/10 text-sm text-neutral-400 space-y-3 page-animate">
                <p><strong class="text-white text-xs uppercase tracking-widest font-bold">{{.T.Get "TechBannerBenefitsTitle"}}</strong></p>
                <ul class="space-y-2">
                    <li class="flex items-start gap-2">
                        <svg class="w-4 h-4 text-primary shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        <span>{{.T.Get "TechBannerBenefit1"}}</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <svg class="w-4 h-4 text-primary shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        <span>{{.T.Get "TechBannerBenefit2"}}</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <svg class="w-4 h-4 text-primary shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        <span>{{.T.Get "TechBannerBenefit3"}}</span>
                    </li>
                    <li class="flex items-start gap-2">
                        <svg class="w-4 h-4 text-primary shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        <span>{{.T.Get "TechBannerBenefit4"}}</span>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>
{{end}}
