{{define "layout.cookie_consent"}}
<div x-data="cookieConsent" x-cloak>
    <div x-show="!accepted" 
         x-transition:enter="transition ease-out duration-500"
         x-transition:enter-start="opacity-0 translate-y-12"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-300"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-12"
         class="fixed bottom-4 md:bottom-8 right-4 md:right-8 w-[calc(100%-2rem)] max-w-md z-50 pointer-events-none">
        
        <div class="group pointer-events-auto bg-neutral-900/80 backdrop-blur-2xl border border-white/10 hover:border-white/20 rounded-3xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.5)] hover:shadow-[0_12px_40px_rgb(0,0,0,0.8)] transition-all duration-500 hover:-translate-y-1 relative overflow-hidden">
            <!-- Glow Effect -->
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/20 rounded-full blur-3xl pointer-events-none transition-all duration-700 group-hover:scale-150 group-hover:bg-primary/30"></div>
            
            <div class="relative z-10 flex items-start gap-4">
                <div class="w-12 h-12 rounded-2xl bg-neutral-800/80 border border-white/5 flex items-center justify-center shrink-0 transition-transform duration-500 group-hover:scale-110 group-hover:-rotate-6 shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-primary drop-shadow-[0_0_8px_rgba(255,51,102,0.5)]">
                        <path d="M12 2a10 10 0 1 0 10 10 4 4 0 0 1-5-5 4 4 0 0 1-5-5"/>
                        <path d="M8.5 8.5v.01"/>
                        <path d="M16 15.5v.01"/>
                        <path d="M12 12v.01"/>
                        <path d="M11 17v.01"/>
                        <path d="M7 14v.01"/>
                    </svg>
                </div>
                
                <div class="flex-1 pt-1">
                    <h3 class="text-white font-semibold text-base leading-none mb-2">{{.T.Get "CookieBannerTitle"}}</h3>
                    <p class="text-neutral-400 text-sm leading-relaxed mb-5">
                        {{.T.Get "CookieBannerText"}}
                        <a href="/privacy" class="text-white hover:text-primary transition-colors underline underline-offset-4 decoration-white/20 hover:decoration-primary font-medium">{{.T.Get "PrivacyTitle"}}</a>.
                    </p>
                    
                    <button @click="accept()" 
                            class="w-full bg-white hover:bg-neutral-100 text-black font-semibold py-2.5 px-4 rounded-xl transition-all duration-300 hover:scale-[1.02] active:scale-95 text-sm hover:shadow-[0_0_20px_rgba(255,255,255,0.4)]">
                        {{.T.Get "CookieBannerAccept"}}
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script nonce="{{.Nonce}}">
document.addEventListener('alpine:init', () => {
    Alpine.data('cookieConsent', () => ({
        accepted: localStorage.getItem('tivri_cookies_accepted') === 'true',
        init() {
            if (this.accepted) {
                this.loadAnalytics();
            }
        },
        accept() {
            this.accepted = true;
            localStorage.setItem('tivri_cookies_accepted', 'true');
            this.loadAnalytics();
        },
        loadAnalytics() {
            if (window.analyticsLoaded) return;
            window.analyticsLoaded = true;
            const token = '{{.CloudflareInsightsToken}}';
            if (token) {
                const script = document.createElement('script');
                script.src = 'https://static.cloudflareinsights.com/beacon.min.js';
                script.defer = true;
                script.setAttribute('data-cf-beacon', '{"token": "' + token + '"}');
                script.setAttribute('nonce', '{{.Nonce}}');
                document.body.appendChild(script);
            }
        }
    }));
});
</script>
{{end}}
