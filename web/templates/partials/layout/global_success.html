{{define "layout.global_success.html"}}
<div id="global-success-toast" data-ref="toast"
     class="global-toast-success">
    <div class="shrink-0 text-green-500 mt-0.5">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
    </div>
    <div class="grow space-y-1">
        <div class="flex items-center justify-between gap-4">
            <h4 data-ref="title" class="text-xs font-black uppercase tracking-wider text-white">Success</h4>
            <span data-ref="time" class="text-[10px] text-neutral-400 font-mono"></span>
        </div>
        <p data-ref="message" class="text-xs text-neutral-300 leading-normal"></p>
    </div>
    <button data-ref="close" class="text-neutral-500 hover:text-white transition-colors shrink-0 cursor-pointer">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
</div>
{{end}}
