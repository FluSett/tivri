{{define "admin.messages.html"}}
<div class="space-y-6"
     x-data="messagesTable(JSON.parse($el.getAttribute('data-messages')))"
     data-messages="{{.MessagesJSON}}">
    <div class="flex flex-wrap gap-4 items-center justify-between bg-black/40 border border-white/8 p-5 rounded-2xl">
        <div class="space-y-1" x-data="{ open: false }">
            <label class="block text-[#FF3366] font-bold uppercase tracking-widest text-[9px] mb-1.5">{{.T.Get "DirectMessagesStatus"}}</label>
            <div class="relative">
                <button @click="open = !open" class="bg-black/60 border border-white/8 hover:border-white/20 text-xs px-3.5 py-2 rounded-xl text-white focus:outline-none transition-all duration-200 cursor-pointer font-medium flex items-center gap-2 min-w-[120px] justify-between">
                    <span x-text="statusFilter.toUpperCase()"></span>
                    <svg class="w-3 h-3 transition-transform" :class="open ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div x-show="open" @click.outside="open = false"
                      x-transition:enter="transition ease-out duration-100"
                      x-transition:enter-start="opacity-0 scale-95"
                      x-transition:enter-end="opacity-100 scale-100"
                      class="absolute z-50 mt-1.5 w-full rounded-xl border border-white/8 bg-[#0A0A0A] p-1 shadow-2xl"
                      x-cloak>
                    <template x-for="opt in ['all', 'new', 'answered', 'done']">
                        <button @click="statusFilter = opt; open = false"
                                class="dropdown-option capitalize"
                                x-text="opt"></button>
                    </template>
                </div>
            </div>
        </div>
        <div class="space-y-1" x-data="{ open: false }">
            <label class="block text-[#FF3366] font-bold uppercase tracking-widest text-[9px] mb-1.5">{{.T.Get "SortByLabel"}}</label>
            <div class="relative">
                <button @click="open = !open" class="bg-black/60 border border-white/8 hover:border-white/20 text-xs px-3.5 py-2 rounded-xl text-white focus:outline-none transition-all duration-200 cursor-pointer font-medium flex items-center gap-2 min-w-[160px] justify-between">
                    <span x-text="{ 'date_desc': 'Newest', 'date_asc': 'Oldest', 'email_asc': 'Email A-Z', 'email_desc': 'Email Z-A' }[sortBy]"></span>
                    <svg class="w-3 h-3 transition-transform" :class="open ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div x-show="open" @click.outside="open = false"
                     x-transition:enter="transition ease-out duration-100"
                     x-transition:enter-start="opacity-0 scale-95"
                     x-transition:enter-end="opacity-100 scale-100"
                     class="absolute z-50 mt-1.5 w-full rounded-xl border border-white/8 bg-[#0A0A0A] p-1 shadow-2xl text-left"
                     x-cloak>
                    <button @click="sortBy = 'date_desc'; open = false" class="dropdown-option">Newest</button>
                    <button @click="sortBy = 'date_asc'; open = false" class="dropdown-option">Oldest</button>
                    <button @click="sortBy = 'email_asc'; open = false" class="dropdown-option">Email A-Z</button>
                    <button @click="sortBy = 'email_desc'; open = false" class="dropdown-option">Email Z-A</button>
                </div>
            </div>
        </div>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="border-b border-white/8 text-neutral-400 text-xs font-semibold uppercase tracking-wider">
                    <th class="py-3 px-4">{{.T.Get "DirectMessagesEmail"}}</th>
                    <th class="py-3 px-4">{{.T.Get "DirectMessagesTopic"}}</th>
                    <th class="py-3 px-4">{{.T.Get "DirectMessagesMessage"}}</th>
                    <th class="py-3 px-4">{{.T.Get "DirectMessagesStatus"}}</th>
                    <th class="py-3 px-4 text-right">{{.T.Get "CreatedCol"}}</th>
                    <th class="py-3 px-4 text-right">{{.T.Get "UpdatedCol"}}</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-white/4 text-sm text-neutral-300">
                <template x-for="m in filteredMessages" :key="m.id">
                    <tr class="hover:bg-white/2 transition-colors">
                        <td class="py-3 px-4 font-bold text-white tracking-tight" x-text="m.email"></td>
                        <td class="py-3 px-4 text-[#FF3366] font-medium" x-text="m.topic"></td>
                        <td class="py-3 px-4 text-neutral-400 leading-relaxed max-w-md" x-data="{ expanded: false }">
                            <div :class="m.message.length > 80 ? 'cursor-pointer hover:text-neutral-200 transition-colors' : ''"
                                 @click="if (m.message.length > 80) expanded = !expanded">
                                <span x-show="!expanded" x-text="m.message.length > 80 ? m.message.substring(0, 80) + '...' : m.message"></span>
                                <span x-show="expanded" x-text="m.message" class="whitespace-pre-wrap" x-cloak></span>
                            </div>
                        </td>
                        <td class="py-3 px-4">
                            <div x-data="{ open: false }" class="relative inline-block text-left">
                                <button @click="open = !open"
                                        :class="{
                                             'text-blue-400 border-blue-500/20 bg-blue-500/5': m.status === 'new',
                                             'text-yellow-400 border-yellow-500/20 bg-yellow-500/5': m.status === 'answered',
                                             'text-green-400 border-green-500/20 bg-green-500/5': m.status === 'done'
                                         }"
                                        class="border text-xs px-2.5 py-1.5 rounded-xl focus:outline-none transition-all duration-200 cursor-pointer font-semibold flex items-center gap-1.5 whitespace-nowrap">
                                     <span x-text="m.status.toUpperCase()"></span>
                                     <svg class="w-3 h-3 transition-transform" :class="open ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
                                 </button>
                                 <div x-show="open" @click.outside="open = false"
                                       x-transition:enter="transition ease-out duration-100"
                                       x-transition:enter-start="opacity-0 scale-95"
                                       x-transition:enter-end="opacity-100 scale-100"
                                       class="absolute z-50 mt-1.5 w-32 rounded-xl border border-white/8 bg-[#0A0A0A] p-1 shadow-2xl"
                                       x-cloak>
                                     <button @click="updateStatus(m, 'new'); open = false" class="dropdown-option text-blue-400">New</button>
                                     <button @click="updateStatus(m, 'answered'); open = false" class="dropdown-option text-yellow-400">Answered</button>
                                     <button @click="updateStatus(m, 'done'); open = false" class="dropdown-option text-green-400">Done</button>
                                 </div>
                            </div>
                        </td>
                        <td class="py-3 px-4 table-cell-meta" x-text="m.createdAtStr"></td>
                        <td class="py-3 px-4 table-cell-meta" x-text="m.updatedAtStr"></td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>
</div>
{{end}}
