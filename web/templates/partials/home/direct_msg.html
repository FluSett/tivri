{{define "home.direct_msg.html"}}
<div class="border border-white/[0.08] bg-white/[0.02] p-8 rounded-xl hover:border-[#FF3366]/30 hover:shadow-[0_0_30px_rgba(255,51,102,0.05)] transition-all duration-500"
     x-data="contact">
    <div>
        <div @click="showForm = !showForm" class="pb-3 border-b border-white/[0.08] flex justify-between items-center cursor-pointer group">
            <div class="space-y-1">
                <h3 class="text-xl font-bold text-white group-hover:text-[#FF3366] transition-colors tracking-tight">{{.T.Get "DirectMsgTitle"}}</h3>
                <p class="text-xs text-neutral-400 mt-1">{{.T.Get "DirectMsgSub"}}</p>
            </div>
            <svg class="w-5 h-5 text-neutral-400 transition-transform duration-300 group-hover:text-white" :class="showForm ? 'rotate-180 text-white' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
            </svg>
        </div>

        <div x-show="showForm" x-cloak x-collapse>
            <div class="pt-6 space-y-6">
                <template x-if="submitted">
                    <div class="backdrop-blur-md bg-green-500/10 border border-green-500/20 text-green-400 p-6 rounded-xl flex flex-col items-center space-y-3 text-center">
                        <div class="flex items-center space-x-3 justify-center">
                            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <div class="text-sm font-semibold tracking-tight">{{.T.Get "SuccessMsg"}}</div>
                        </div>
                        <button type="button" @click="resetForm()" class="text-xs text-neutral-400 hover:text-white underline transition-colors pt-2">
                            {{.T.Get "SendAnother"}}
                        </button>
                    </div>
                </template>

                <template x-if="!submitted">
                    <form id="contact-form"
                          @submit.prevent="handleSubmit($event)"
                          hx-post="/api/contact"
                          hx-target="this"
                          hx-swap="none"
                          @htmx:after-request="if($event.detail.successful) { submitted = true; email = ''; topic = ''; message = ''; sessionStorage.removeItem('contact_email'); sessionStorage.removeItem('contact_topic'); sessionStorage.removeItem('contact_message'); } submitStatus = 'idle';"
                          class="space-y-4">
                        <input type="hidden" name="lang" value="{{.Lang}}">
                        {{if .TurnstileSiteKey}}
                        <input type="hidden" name="cf-turnstile-response" x-model="turnstileToken">
                        {{end}}
                        <div class="space-y-1">
                            <label class="form-label">{{.T.Get "FormEmailLabel"}}</label>
                            <input type="email" name="email" required minlength="5" maxlength="100" x-model="email"
                                   @input.debounce.500ms="emailTouched = true" @blur="emailTouched = true"
                                   class="form-input" placeholder="{{.T.Get "PlaceholderEmail"}}">
                            <div class="text-[10px] text-[#FF3366] font-medium" x-show="emailTouched && (email.trim().length < 5 || !email.includes('@') || !email.includes('.'))">
                                {{.T.Get "ValValidEmail"}}
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="form-label">{{.T.Get "FormTopicLabel"}}</label>
                            <input type="text" name="topic" required minlength="3" maxlength="150" x-model="topic"
                                   @input.debounce.500ms="topicTouched = true" @blur="topicTouched = true"
                                   class="form-input" placeholder="{{.T.Get "PlaceholderTopic"}}">
                            <div class="text-[10px] text-[#FF3366] font-medium" x-show="topicTouched && topic.trim().length < 3">
                                {{.T.Get "ValTopicRequired"}}
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="form-label">{{.T.Get "FormMessageLabel"}}</label>
                            <textarea name="message" required minlength="10" maxlength="1000" rows="4"
                                      x-model="message"
                                      @input.debounce.500ms="messageTouched = true" @blur="messageTouched = true"
                                      x-data="{ resize() { $el.style.height = 'auto'; $el.style.height = ($el.scrollHeight) + 'px' } }"
                                      x-on:input="resize()"
                                      class="form-input resize-none max-h-48"
                                      placeholder="{{.T.Get "PlaceholderMessage"}}"></textarea>
                            <div class="flex justify-between items-center text-[10px] mt-1">
                                <span class="text-[#FF3366] font-medium" x-show="messageTouched && message.trim().length < 10">
                                    {{.T.Get "ValMessageMin10"}}
                                </span>
                                <span x-show="!messageTouched || message.trim().length >= 10"></span>
                                <span class="text-neutral-400 font-semibold font-mono text-xs" x-text="message.length + ' / 1000'"></span>
                            </div>
                        </div>
                        {{if .TurnstileSiteKey}}
                        <div class="flex justify-center py-2">
                            <div x-ref="turnstileContainer"></div>
                        </div>
                        {{end}}
                        <div id="contact-status">
                            <button type="submit"
                                    :disabled="submitStatus !== 'idle' || email.trim().length < 5 || !email.includes('@') || !email.includes('.') || topic.trim().length < 3 || message.trim().length < 10"
                                    :class="(email.trim().length < 5 || !email.includes('@') || !email.includes('.') || topic.trim().length < 3 || message.trim().length < 10) ? 'bg-white/10 text-neutral-500 cursor-not-allowed border-transparent' : (submitStatus !== 'idle' ? 'bg-[#FF3366] text-white border border-[#FF3366] cursor-wait shadow-[0_0_15px_rgba(255,51,102,0.4)]' : 'bg-transparent text-white border border-[#FF3366] hover:bg-[#FF3366] hover:shadow-[0_0_15px_rgba(255,51,102,0.4)]')"
                                    class="w-full font-bold text-xs uppercase tracking-wider py-3 rounded-lg transition-all duration-300 flex items-center justify-center space-x-2">
                                <span x-show="submitStatus === 'idle'">{{.T.Get "FormSubmitBtn"}}</span>
                                <span x-show="submitStatus !== 'idle'" class="flex items-center space-x-2">
                                    <svg class="animate-spin h-3.5 w-3.5 text-white" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                </span>
                            </button>
                        </div>
                    </form>
                </template>
            </div>
        </div>
    </div>
</div>
{{end}}
