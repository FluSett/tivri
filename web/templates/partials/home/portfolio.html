{{define "section.portfolio.html"}}
<section id="portfolio" class="relative min-h-[80vh] flex flex-col justify-between py-8 md:py-12 scroll-mt-16 md:scroll-mt-28">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-center my-auto flex-grow">
        <div class="section-sidebar">
            <div class="section-marker-container">
                 <span class="text-xs font-bold tracking-widest text-[#FF3366] rotate-90 my-4">04</span>
                 <div class="section-marker-line"></div>
            </div>
        </div>
        
        <div class="lg:col-span-11 space-y-8 w-full">
            <div class="section-title-wrap">
                <div class="section-accent-line"></div>
                <h2 class="section-accent-text">{{.T.Get "PortfolioNav"}}</h2>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
                {{range .PortfolioItems}}
                    {{template "portfolio.html" .}}
                {{end}}
            </div>
            
            <div class="border border-dashed border-[#FF3366]/30 rounded-xl p-10 bg-white/[0.01] flex flex-col items-center text-center space-y-6 max-w-4xl mx-auto">
                <h3 class="text-2xl font-bold text-white tracking-tight">{{.T.Get "PortfolioHeadline"}}</h3>
                <p class="text-sm text-neutral-400 max-w-lg leading-relaxed">{{.T.Get "PortfolioPitch"}}</p>
                <a href="#contact" @click="openStepper = true" class="inline-block bg-transparent text-white border border-[#FF3366] hover:bg-[#FF3366] hover:text-white hover:shadow-[0_0_15px_rgba(255,51,102,0.4)] font-bold text-xs uppercase tracking-wider px-8 py-3.5 rounded-lg transition-all duration-300">
                    {{.T.Get "PortfolioBtn"}}
                </a>
            </div>
        </div>
    </div>

    <div class="section-footer-nav">
        <div class="flex items-center space-x-4">
            <a href="/#skills" class="btn-icon">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path>
                </svg>
            </a>
            <a href="/#contact" class="btn-icon">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path>
                </svg>
            </a>
        </div>
    </div>
</section>
{{end}}
