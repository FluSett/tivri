{{define "section.contact.html"}}
<section id="contact" class="relative min-h-[80vh] flex flex-col justify-between py-8 md:py-12 scroll-mt-16 md:scroll-mt-28">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-center my-auto grow">
        <div class="section-sidebar">
            <div class="section-marker-container">
                 <span class="text-xs font-bold tracking-widest text-primary rotate-90 my-4">05</span>
                 <div class="section-marker-line"></div>
            </div>
        </div>

        <div class="lg:col-span-11 space-y-8 w-full">
            <div class="section-title-wrap">
                <div class="section-accent-line"></div>
                <h2 class="section-accent-text">{{.T.Get "ContactNav"}}</h2>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                {{template "home.intake.html" .}}
                {{template "home.direct_msg.html" .}}
            </div>
        </div>
    </div>

    {{template "components.section_nav" dict "PrevDisabled" false "PrevLink" "/#portfolio" "NextDisabled" true "NextLink" ""}}
</section>
{{end}}
