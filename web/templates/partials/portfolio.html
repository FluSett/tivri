{{define "portfolio.html"}}
<div class="portfolio-card">
    <div x-data="{ activeIndex: 0, media: [{{range $i, $m := .Media}}{{if $i}},{{end}}'{{$m}}'{{end}}] }" class="space-y-4">
        <template x-if="media.length > 0">
            <div class="relative w-full aspect-video rounded-xl overflow-hidden bg-black/40 border border-white/8">
                <template x-for="(item, index) in media" :key="index">
                    <div x-show="activeIndex === index" class="absolute inset-0 w-full h-full">
                        <template x-if="item.endsWith('.mp4') || item.endsWith('.webm')">
                            <video :src="item" class="w-full h-full object-cover" controls muted playsinline></video>
                        </template>
                        <template x-if="!(item.endsWith('.mp4') || item.endsWith('.webm'))">
                            <img :src="item" class="w-full h-full object-cover" alt="Portfolio media">
                        </template>
                    </div>
                </template>
                <template x-if="media.length > 1">
                    <div class="absolute inset-x-0 bottom-2 flex justify-center space-x-1.5 z-10">
                        <template x-for="(item, index) in media" :key="index">
                            <button @click="activeIndex = index"
                                    :class="activeIndex === index ? 'bg-[#FF3366] w-4' : 'bg-white/40 w-1.5'"
                                    class="h-1.5 rounded-full transition-all duration-300 focus:outline-none cursor-pointer"></button>
                        </template>
                    </div>
                </template>
                <template x-if="media.length > 1">
                    <div>
                        <button type="button" @click="activeIndex = (activeIndex - 1 + media.length) % media.length" class="absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-black/60 hover:bg-black/80 flex items-center justify-center text-white border border-white/10 hover:border-white/20 transition-all z-10 cursor-pointer">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <button type="button" @click="activeIndex = (activeIndex + 1) % media.length" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-black/60 hover:bg-black/80 flex items-center justify-center text-white border border-white/10 hover:border-white/20 transition-all z-10 cursor-pointer">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </template>
            </div>
        </template>

        <div class="flex justify-between items-start gap-4">
            <h3 class="text-base font-bold text-white tracking-tight leading-tight">{{.Title}}</h3>
        </div>
        <p class="text-neutral-400 text-sm leading-relaxed tracking-tight">{{.Description}}</p>
        <div class="flex flex-wrap gap-2">
            <span class="bg-white/4 text-neutral-300 text-xs px-2.5 py-1 rounded-lg border border-white/6 tracking-tight font-medium">{{.TechStack}}</span>
        </div>
    </div>
</div>
{{end}}
