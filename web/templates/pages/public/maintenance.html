{{define "content"}}
<div class="min-h-[70vh] flex flex-col items-center justify-center text-center py-20 px-6 space-y-8">
    <div class="relative w-32 h-32 flex items-center justify-center">
        <div class="absolute inset-0 rounded-full border border-[#FF3366]/20 animate-ping ping-slow"></div>
        <div class="relative w-24 h-24 rounded-full bg-white/[0.02] border border-white/[0.08] flex flex-col items-center justify-center shadow-2xl backdrop-blur-md">
            <svg class="w-10 h-10 text-[#FF3366] animate-spin" style="animation-duration: 8s;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </div>
    </div>

    <div class="space-y-3 max-w-md">
        <h2 class="text-2xl md:text-3xl font-black tracking-tighter text-white">{{.T.Get "MaintenanceTitle"}}</h2>
        <p class="text-sm text-neutral-400 leading-relaxed">
            {{.T.Get "MaintenanceText"}}
        </p>
    </div>
</div>
{{end}}
