{{define "content"}}
<div class="status-page-wrapper">
    <div class="relative w-36 h-36 flex items-center justify-center">
        <div class="absolute inset-0 rounded-full border border-primary/30 bg-primary/5 animate-ping ping-slow"></div>
        <div class="status-icon-box">
            <svg class="w-10 h-10 text-primary animate-spin" style="animation-duration: 8s;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </div>
    </div>

    <div class="space-y-3 max-w-lg mx-auto">
        <h1 class="text-3xl md:text-4xl font-black tracking-tight text-white">{{.T.Get "MaintenanceTitle"}}</h1>
        <p class="text-sm md:text-base text-neutral-400 leading-relaxed max-w-md mx-auto">
            {{.T.Get "MaintenanceText"}}
        </p>
    </div>
</div>
{{end}}
