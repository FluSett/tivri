{{define "content"}}
<div class="status-page-wrapper">
    <div class="relative w-36 h-36 flex items-center justify-center">
        <div class="absolute inset-0 rounded-full border border-primary/30 bg-primary/5 animate-ping ping-slow"></div>
        <div class="status-icon-box">
            <span class="text-4xl font-black tracking-tight text-white font-mono drop-shadow-md">404</span>
        </div>
    </div>

    <div class="space-y-3 max-w-lg mx-auto">
        <h1 class="text-3xl md:text-4xl font-black tracking-tight text-white">{{.T.Get "Error404Title"}}</h1>
        <p class="text-sm md:text-base text-neutral-400 leading-relaxed max-w-md mx-auto">
            {{.T.Get "Error404Desc"}}
        </p>
    </div>

    <div class="pt-2">
        <a href="/" class="inline-flex items-center space-x-2.5 bg-primary text-white hover:bg-primary/90 hover:shadow-[0_0_30px_rgba(255,51,102,0.4)] font-bold text-xs uppercase tracking-wider px-8 py-3.5 rounded-xl transition-all duration-300 transform hover:-translate-y-0.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            <span>{{.T.Get "BackToHome"}}</span>
        </a>
    </div>
</div>
{{end}}
