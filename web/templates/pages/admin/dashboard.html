{{define "content"}}
<div class="space-y-12">
    <div class="border border-white/[0.08] backdrop-blur-md bg-white/[0.02] p-8 rounded-2xl space-y-6">
        <h2 class="text-3xl font-extrabold tracking-tighter text-white">{{.T.Get "AdminTitle"}}</h2>

        {{if eq .AdminTab "portfolio"}}
            {{template "admin.portfolio.html" .}}
        {{else if eq .AdminTab "leads"}}
            {{template "admin.leads.html" .}}
        {{else if eq .AdminTab "messages"}}
            {{template "admin.messages.html" .}}
        {{end}}
    </div>
</div>
{{end}}
