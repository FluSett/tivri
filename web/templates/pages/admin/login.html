{{define "content"}}
<div class="max-w-md mx-auto my-4 md:my-8 border border-white/[0.08] backdrop-blur-md bg-white/[0.02] p-8 md:p-10 rounded-2xl space-y-8 shadow-2xl hover:shadow-[0_0_40px_rgba(255,51,102,0.06)] hover:border-[#FF3366]/20 transition-all duration-500">
    <div class="text-center space-y-3">
        <h2 class="text-3xl font-black tracking-tight text-white">{{.T.Get "LoginTitle"}}</h2>
        <p class="text-xs text-neutral-400 tracking-wide max-w-[280px] mx-auto leading-relaxed">{{.T.Get "LoginSubtitle"}}</p>
    </div>

    {{if .Error}}
    <div class="p-4 bg-red-500/10 border border-red-500/20 text-red-400 text-xs rounded-xl text-center font-medium">
        {{.Error}}
    </div>
    {{end}}

    <form method="POST" action="/admin/login" class="space-y-6">
        <div class="space-y-2">
            <label class="form-label">{{.T.Get "LabelUsername"}}</label>
            <input type="text" name="username" required autocomplete="username" class="form-input">
        </div>

        <div class="space-y-2">
            <label class="form-label">{{.T.Get "LabelPassword"}}</label>
            <input type="password" name="password" required autocomplete="current-password" class="form-input">
        </div>

        <button type="submit" class="w-full bg-[#FF3366] text-white font-bold py-3.5 rounded-xl hover:bg-[#FF3366]/80 hover:shadow-[0_0_15px_rgba(255,51,102,0.4)] transition-all duration-300 text-xs uppercase tracking-widest">
            {{.T.Get "BtnLogin"}}
        </button>
    </form>
</div>
{{end}}
