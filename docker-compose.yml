services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - tivri_pgdata:/var/lib/postgresql/data
    networks:
      - tivri_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/flusett/tivri:latest
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DB_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable&application_name=tivri
      - PORT=8080
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    volumes:
      - tivri_uploads:/web/assets/uploads
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    networks:
      - tivri_net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tivri_pgdata:
  tivri_uploads:

networks:
  tivri_net:
    driver: bridge
