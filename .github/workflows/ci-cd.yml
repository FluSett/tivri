name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  IMAGE_NAME: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm install

      - name: Build Tailwind CSS
        run: npx tailwindcss -i web/assets/css/input.css -o web/assets/css/theme.css --minify

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install Dependencies
        run: go mod download

      - name: Run Tests
        run: go test -v ./...

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm install

      - name: Build Tailwind CSS
        run: npx tailwindcss -i web/assets/css/input.css -o web/assets/css/theme.css --minify

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image Name
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy docker-compose.yml and web assets to Droplet
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT }}
          source: "docker-compose.yml,web"
          target: "/var/www/tivri"

      - name: Check if configuration or scripts changed
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nginx:
              - 'nginx/tivri.conf'
            scripts:
              - 'scripts/**'

      - name: Copy scripts to Droplet
        if: steps.filter.outputs.scripts == 'true'
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT }}
          source: "scripts"
          target: "/var/www/tivri"

      - name: Copy Nginx configuration to Droplet
        if: steps.filter.outputs.nginx == 'true'
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT }}
          source: "nginx/tivri.conf"
          target: "/etc/nginx/sites-available"
          strip_components: 1

      - name: Reload Nginx configuration
        if: steps.filter.outputs.nginx == 'true'
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          port: ${{ secrets.DROPLET_SSH_PORT }}
          script: nginx -t && systemctl reload nginx

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_PASSPHRASE }}
          port: ${{ secrets.DROPLET_SSH_PORT }}
          script: |
            cd /var/www/tivri
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            chmod +x /var/www/tivri/scripts/health_check.sh
            if [ -f /var/www/tivri/.env ]; then
              BOT_TOKEN=$(grep -E "^TELEGRAM_BOT_TOKEN=" /var/www/tivri/.env | cut -d'=' -f2- | tr -d '"'\''\r')
              CHAT_ID=$(grep -E "^TELEGRAM_CHAT_ID=" /var/www/tivri/.env | cut -d'=' -f2- | tr -d '"'\''\r')
              if [ -n "$BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
                CRON_LINE="*/5 * * * * /var/www/tivri/scripts/health_check.sh \"http://127.0.0.1:8080\" \"$BOT_TOKEN\" \"$CHAT_ID\" >> /var/log/tivri_health.log 2>&1"
                (crontab -l 2>/dev/null | grep -F "health_check.sh" >/dev/null) || (crontab -l 2>/dev/null; echo "$CRON_LINE") | crontab -
              fi
            fi
