name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  IMAGE_NAME: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm install

      - name: Build Assets
        run: npm run build

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Install Dependencies
        run: go mod download

      - name: Run Tests
        run: go test -v ./...

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm install

      - name: Build Assets
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image Name
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.DROPLET_SSH_PORT }} -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts
          eval "$(ssh-agent -s)"
          if [ -n "${{ secrets.DROPLET_SSH_PASSPHRASE }}" ]; then
            sudo apt-get update && sudo apt-get install -y expect
            expect -c "
              spawn ssh-add ~/.ssh/id_rsa
              expect \"Enter passphrase\"
              send \"${{ secrets.DROPLET_SSH_PASSPHRASE }}\r\"
              expect eof
            "
          else
            ssh-add ~/.ssh/id_rsa
          fi
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

      - name: Copy docker-compose.yml to Droplet
        run: scp -P ${{ secrets.DROPLET_SSH_PORT }} docker-compose.yml ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }}:/var/www/tivri/

      - name: Check if configuration or scripts changed
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            nginx:
              - 'nginx/tivri.conf'
            scripts:
              - 'scripts/**'

      - name: Copy scripts to Droplet
        if: steps.filter.outputs.scripts == 'true'
        run: scp -r -P ${{ secrets.DROPLET_SSH_PORT }} scripts ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }}:/var/www/tivri/

      - name: Copy Nginx configuration to Droplet
        if: steps.filter.outputs.nginx == 'true'
        run: scp -P ${{ secrets.DROPLET_SSH_PORT }} nginx/tivri.conf ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }}:/etc/nginx/sites-available/tivri.conf

      - name: Reload Nginx configuration
        if: steps.filter.outputs.nginx == 'true'
        run: ssh -p ${{ secrets.DROPLET_SSH_PORT }} ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }} "nginx -t && systemctl reload nginx"

      - name: Deploy to DigitalOcean
        run: |
          ssh -p ${{ secrets.DROPLET_SSH_PORT }} ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }} << 'EOF'
            cd /var/www/tivri
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            chmod +x /var/www/tivri/scripts/health_check.sh
            if [ -f /var/www/tivri/.env ]; then
              BOT_TOKEN=$(grep -E "^TELEGRAM_BOT_TOKEN=" /var/www/tivri/.env | cut -d'=' -f2- | tr -d '"'\''\r')
              CHAT_ID=$(grep -E "^TELEGRAM_CHAT_ID=" /var/www/tivri/.env | cut -d'=' -f2- | tr -d '"'\''\r')
              if [ -n "$BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
                CRON_LINE="*/5 * * * * /var/www/tivri/scripts/health_check.sh \"http://127.0.0.1:8080\" \"$BOT_TOKEN\" \"$CHAT_ID\" >> /var/log/tivri_health.log 2>&1"
                (crontab -l 2>/dev/null | grep -F "health_check.sh" >/dev/null) || (crontab -l 2>/dev/null; echo "$CRON_LINE") | crontab -
              fi
            fi
          EOF
